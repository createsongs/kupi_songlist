  <style>
    :root {
      --bg: #fff8fb;
      --card: #ffffff;
      --text: #332a30;
      --sub: #7b6c74;
      --accent: #d9b8c5;
      --accent-strong: #ef8b8b;
      --line: #d67bac;
      --shadow: 0 10px 28px rgba(177, 92, 121, .12);
      --hero-focus-y: 0px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
 body {
  margin: 0;
  font-family:
   "Hiragino Maru Gothic ProN",
   "Hiragino Sans",
   "Yu Gothic",
   sans-serif;
  background: radial-gradient(circle at top, #fffdf5 0%, #fffef8 32%, #ffffff 100%);
  color: var(--text);
}
    .app {
      max-width: 760px;
      margin: 0 auto;
      min-height: 100vh;
      padding-bottom: 32px;
    }
    .hero {
      width: 100%;
      aspect-ratio: 16 / 7;
      min-height: 180px;
      max-height: 300px;
      overflow: hidden;
      background: #f7dce5;
    }
    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center var(--hero-focus-y);
      display: block;
    }
    .sticky-area {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(10px);
      background: rgba(252, 242, 248, .35);
      border-bottom: 1px solid rgba(242, 215, 225, .9);
    }
    .inner {
      padding: 12px 14px 10px;
    }
    .search-wrap {
      position: relative;
      margin-bottom: 10px;
    }
    .search-wrap input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 14px 16px 14px 44px;
      font-size: 16px;
      outline: none;
      box-shadow: var(--shadow);
    }
    .search-wrap input:focus {
      border-color: #f1a5bd;
      box-shadow: 0 0 0 4px rgba(245, 159, 188, .18);
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      opacity: .65;
      pointer-events: none;
    }
    .top-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    .tabs {
      display: inline-flex;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px;
      box-shadow: var(--shadow);
    }
    .tab {
      border: 0;
      background: transparent;
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 700;
      color: var(--sub);
      cursor: pointer;
    }
    .tab.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
    }
    .count {
      font-size: 13px;
      color: var(--sub);
      white-space: nowrap;
      padding-right: 2px;
    }
    .jump {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .jump::-webkit-scrollbar { display: none; }
    .jump button {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      background: #fff;
      color: #6c4d5a;
      border-radius: 999px;
      padding: 8px 11px;
      min-width: 36px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(177, 92, 121, .08);
    }
    .jump button:hover { border-color: #faf0e6; }
    .section { padding: 14px; }
    .empty {
      display: none;
      padding: 36px 22px 20px;
      text-align: center;
      color: var(--sub);
      font-size: 14px;
    }
    .song-list {
      display: grid;
      gap: 10px;
    }
.song-item {
  display: grid;
  grid-template-columns: 42px 1fr auto;
  gap: 12px;
  align-items: start;
  background: var(--card);
  border: 1px solid #f6dbe5;
  border-radius: 18px;
  padding: 12px 13px;
  box-shadow: var(--shadow);
  scroll-margin-top: 174px;

  cursor: pointer;
  transition: transform .08s ease;
}

.song-item:active {
  transform: scale(.97);
}    .initial {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, #ffe2ec, #ffd3e1);
      color: #a25070;
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 12px;
    }
.meta { min-width: 0; }

.title {
  margin-top: 2px;
  color: #7b6c74;
  font-size: 15px;
  font-weight: 500;
  line-height: 1.35;
  word-break: break-word;
}

.artist {
  margin-top: 2px;
  color: var(--text);
  font-size: 17px;
  font-weight: 800;
  line-height: 1.35;
  word-break: break-word;
}
    .fav-btn {
      appearance: none;
      border: 0;
      background: transparent;
      cursor: pointer;
      font-size: 23px;
      line-height: 1;
      padding: 4px 2px;
      color: #d7b3c0;
      align-self: center;
    }
    .fav-btn.active {
      color: #ffb700;
      filter: drop-shadow(0 4px 10px rgba(255, 183, 0, .2));
    }
    .footer-space { height: 18px; }
    @media (max-width: 480px) {
      .inner { padding: 10px 10px 9px; }
      .section { padding: 10px; }
      .song-item { grid-template-columns: 38px 1fr auto; padding: 11px; border-radius: 16px; }
      .initial { width: 38px; height: 38px; border-radius: 12px; font-size: 14px; }
      .title { font-size: 15px; }
      .artist { font-size: 13px; }
      .count { font-size: 12px; }
    }
  .toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  padding: 10px 16px;
  border-radius: 999px;
  font-size: 14px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.toast.show {
  opacity: 1;
}

.social-grid{
display:flex;
gap:18px;
overflow-x:auto;
padding:8px 4px 12px;
margin-top:6px;

  margin:6px 2px 10px;

    const songList = document.getElementById('songList');
    const searchBox = document.getElementById('searchBox');
    const countText = document.getElementById('countText');
    const emptyState = document.getElementById('emptyState');
    const tabs = document.querySelectorAll('.tab');
    const jumpButtons = document.querySelectorAll('[data-jump]');
    const FAVORITES_KEY = 'mao-song-favorites-v1';

    let mode = 'all';
    let keyword = '';

    function loadFavorites() {
      try {
        return new Set(JSON.parse(localStorage.getItem(FAVORITES_KEY) || '[]'));
      } catch (e) {
        return new Set();
      }
    }

    let favorites = loadFavorites();

    function saveFavorites() {
      localStorage.setItem(FAVORITES_KEY, JSON.stringify([...favorites]));
    }

    function songId(song) {
      return [song.initial, song.title, song.artist, song.memo].join('||');
    }

    function matches(song) {
      const text = `${song.initial} ${song.title} ${song.artist} ${song.memo}`.toLowerCase();
      const hitKeyword = !keyword || text.includes(keyword);
      const hitMode = mode === 'all' || favorites.has(songId(song));
      return hitKeyword && hitMode;
    }

    function render() {
      const filtered = songs.filter(matches);

      songList.innerHTML = filtered.map(song => {
        const id = songId(song);
        const isFav = favorites.has(id);
        const memoHtml = song.memo ? `<div class="memo">🎼 ${escapeHtml(song.memo)}</div>` : '';
        return `
          <div class="song-item" data-initial="${escapeAttr(song.initial)}" data-id="${escapeAttr(id)}">
            <div class="initial">${escapeHtml(song.initial)}</div>
            <div class="meta">
             <div class="title">${escapeHtml(song.artist)}</div>
             <div class="artist">${escapeHtml(song.title)}</div>
              ${memoHtml}
            </div>
            <button class="fav-btn ${isFav ? 'active' : ''}" type="button" aria-label="favorite">${isFav ? '★' : '☆'}</button>
          </div>
        `;
      }).join('');

      countText.textContent = `${filtered.length}曲`;
      emptyState.style.display = filtered.length ? 'none' : 'block';

      document.querySelectorAll('.fav-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const item = e.currentTarget.closest('.song-item');
          const id = item.dataset.id;
          if (favorites.has(id)) {
            favorites.delete(id);
          } else {
            favorites.add(id);
          }
          saveFavorites();
          render();
        });
      });
    }

    function jumpTo(letter) {
      const items = [...document.querySelectorAll('.song-item')];
      const target = items.find(item => (item.dataset.initial || '').startsWith(letter));
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function escapeAttr(text) {
      return escapeHtml(text).replaceAll('`', '&#96;');
    }

    searchBox.addEventListener('input', (e) => {
      keyword = e.target.value.trim().toLowerCase();
      render();
    });

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        mode = tab.dataset.mode;
        tabs.forEach(t => t.classList.toggle('active', t === tab));
        render();
      });
    });

    jumpButtons.forEach(btn => {
      btn.addEventListener('click', () => jumpTo(btn.dataset.jump));
    });

/* ↓↓↓ 曲タップでコピー機能 ↓↓↓ */

let pressTimer;

function copySong(item){

  const title = item.querySelector(".title")?.innerText || "";
  const artist = item.querySelector(".artist")?.innerText || "";
  const text = `リクエスト：${title} / ${artist}`;

  navigator.clipboard.writeText(text);

  const toast = document.getElementById("toast");
  toast.innerText = "コピーしました\n" + text;
  toast.classList.add("show");

  setTimeout(()=>toast.classList.remove("show"),2000);
}

/* スマホ長押し */

document.addEventListener("touchstart", function(e){

  const item = e.target.closest(".song-item");
  if(!item) return;

  pressTimer = setTimeout(()=>copySong(item),600);

});

document.addEventListener("touchend", ()=> clearTimeout(pressTimer));
document.addEventListener("touchmove", ()=> clearTimeout(pressTimer));

/* PCクリック */

document.addEventListener("click", function(e){

  const item = e.target.closest(".song-item");
  if(!item) return;

  copySong(item);

});
</script>
